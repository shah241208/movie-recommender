<div class="nav-center">
    <a href="/home">Home</a>

<h2 style="text-align:center">🎬 Recommended Movies</h2>

<div class="grid">
    {% for m in movies %}
    <div class="card">
        <img src="{{ m.poster }}" width="100%">
        <h4>{{ m.title }}</h4>
        <a href="{{ m.trailer }}" target="_blank" class="btn">▶ Watch Trailer</a>
    </div>
    {% endfor %}
</div>
